openapi: 3.1.0
info:
  title: API Sucursales Restaurante
  description: |
    Especificación viva de los tres flujos de endpoints. La UI interactiva está en `/docs/api`.
    Ramas sugeridas: `flow/sucursales`, `flow/catalogo`, `flow/pedidos`.
  version: 0.1.0
servers:
  - url: /
    description: Servidor local (php artisan serve)
tags:
  - name: Auth
    description: Autenticación (Laravel Sanctum).
  - name: Sucursales
    description: Flujo `flow/sucursales` — ubicaciones, horarios, datos de sucursal.
  - name: Catálogo
    description: Flujo `flow/catalogo` — menú, categorías, precios, disponibilidad.
  - name: Pedidos
    description: Flujo `flow/pedidos` — órdenes, estados, pagos.

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      description: |
        Autentica al usuario y devuelve un token Bearer para consumir endpoints protegidos.
        En Swagger UI: copia el `token` y úsalo en **Authorize** como `Bearer <token>`.
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_credentials:
                  value: { message: "Credenciales inválidas" }

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Obtener usuario autenticado
      operationId: authMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario actual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión
      description: Invalida el token actual (según implementación de Sanctum).
      operationId: authLogout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                ok:
                  value: { message: "Logout exitoso" }
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/sucursales/health:
    get:
      tags: [Sucursales]
      summary: Health del flujo sucursales
      operationId: sucursalesHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  flow:
                    type: string
                    example: sucursales
                  message:
                    type: string

  /api/v1/catalogo/health:
    get:
      tags: [Catálogo]
      summary: Health del flujo catálogo
      operationId: catalogoHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  flow:
                    type: string
                    example: catalogo
                  message:
                    type: string

  /api/v1/pedidos/health:
    get:
      tags: [Pedidos]
      summary: Health del flujo pedidos
      operationId: pedidosHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  flow:
                    type: string
                    example: pedidos
                  message:
                    type: string

  /api/v1/pedidos:
    get:
      tags: [Pedidos]
      summary: Listar pedidos
      operationId: pedidosIndex
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: estado
          schema: { type: string, enum: [pendiente, en_preparacion, listo, entregado, cancelado] }
        - in: query
          name: canal
          schema: { type: string, enum: [salon, delivery, take-away] }
        - in: query
          name: sucursal
          schema: { type: string }
      responses:
        '200':
          description: Lista paginada de pedidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pedido'
    post:
      tags: [Pedidos]
      summary: Crear pedido
      operationId: pedidosStore
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PedidoCreateRequest'
      responses:
        '201':
          description: Pedido creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pedido'
        '422':
          description: Error de validación

  /api/v1/pedidos/{id}:
    get:
      tags: [Pedidos]
      summary: Obtener detalle de pedido
      operationId: pedidosShow
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Pedido encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pedido'
        '404':
          description: Pedido no encontrado
    delete:
      tags: [Pedidos]
      summary: Eliminar pedido
      operationId: pedidosDestroy
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Pedido eliminado
        '404':
          description: Pedido no encontrado
        '409':
          description: Conflicto por estado entregado

  /api/v1/pedidos/{id}/estado:
    patch:
      tags: [Pedidos]
      summary: Cambiar estado del pedido
      operationId: pedidosUpdateEstado
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [estado]
              properties:
                estado:
                  type: string
                  enum: [pendiente, en_preparacion, listo, entregado, cancelado]
      responses:
        '200':
          description: Estado actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pedido'
        '422':
          description: Transición no válida o error de validación
        '404':
          description: Pedido no encontrado

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
  schemas:
    Error:
      type: object
      properties:
        message: { type: string, example: "Error" }

    MessageResponse:
      type: object
      properties:
        message: { type: string, example: "OK" }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: "admin@demo.com" }
        password: { type: string, example: "password" }
        device_name:
          type: string
          description: Identificador del dispositivo (opcional).
          example: "swagger-ui"

    LoginResponse:
      type: object
      properties:
        token: { type: string, example: "1|9uX...tu_token..." }
        token_type: { type: string, example: "Bearer" }
        user:
          $ref: '#/components/schemas/User'

    MeResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Administrador" }
        email: { type: string, format: email, example: "admin@demo.com" }
    Pedido:
      type: object
      properties:
        id: { type: integer, example: 1 }
        codigo: { type: string, example: PED-20260408-001 }
        cliente_nombre: { type: string, nullable: true, example: Juan Pérez }
        canal: { type: string, enum: [salon, delivery, take-away] }
        sucursal: { type: string, example: San Salvador Centro }
        estado: { type: string, enum: [pendiente, en_preparacion, listo, entregado, cancelado] }
        total: { type: number, format: float, example: 25.50 }
        items:
          type: array
          items:
            type: object
            properties:
              nombre: { type: string, example: Hamburguesa Clásica }
              cantidad: { type: integer, example: 2 }
              precio_unitario: { type: number, format: float, example: 8.75 }
        notas: { type: string, nullable: true, example: Sin cebolla }
        created_by: { type: integer, nullable: true, example: 5 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PedidoCreateRequest:
      type: object
      required: [canal, sucursal, items]
      properties:
        cliente_nombre: { type: string, example: Juan Pérez }
        canal: { type: string, enum: [salon, delivery, take-away] }
        sucursal: { type: string, example: San Salvador Centro }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [nombre, cantidad, precio_unitario]
            properties:
              nombre: { type: string, example: Hamburguesa Clásica }
              cantidad: { type: integer, minimum: 1, example: 2 }
              precio_unitario: { type: number, minimum: 0, example: 8.75 }
        notas: { type: string, example: Sin cebolla }

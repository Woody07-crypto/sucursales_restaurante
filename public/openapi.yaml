components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: Token devuelto por `POST /api/v1/auth/login`

  schemas:
    StockPayload:
      type: object
      properties:
        estado:
          type: string
          enum: [ok, warning, critical]
        alertas:
          type: array
          items:
            type: object
        ordenes_compra:
          type: array
          items:
            type: object
        items_menu_bloqueados:
          type: array
          items:
            type: object
        notificaciones:
          type: array
          items:
            type: object

    PedidoCreadoConStock:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Pedido'
        stock:
          $ref: '#/components/schemas/StockPayload'

    Pedido:
      type: object
      properties:
        id: { type: integer, example: 1 }
        codigo: { type: string, example: PED-20260408-001 }
        cliente_nombre: { type: string, nullable: true, example: Juan Pérez }
        canal: { type: string, enum: [salon, delivery, take-away] }
        sucursal: { type: string, example: San Salvador Centro }
        estado: { type: string, enum: [pendiente, en_preparacion, listo, entregado, cancelado] }
        total: { type: number, format: float, example: 25.50 }
        items:
          type: array
          items:
            type: object
            properties:
              nombre: { type: string, example: Hamburguesa Clásica }
              cantidad: { type: integer, example: 2 }
              precio_unitario: { type: number, format: float, example: 8.75 }
        notas: { type: string, nullable: true, example: Sin cebolla }
        created_by: { type: integer, nullable: true, example: 5 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PedidoCreateRequest:
      type: object
      required: [canal, sucursal, items]
      properties:
        cliente_nombre: { type: string, example: Juan Pérez }
        canal: { type: string, enum: [salon, delivery, take-away] }

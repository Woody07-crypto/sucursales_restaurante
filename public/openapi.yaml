paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión (token Sanctum)
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Token emitido
        '422':
          description: Validación o credenciales inválidas

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión (revoca token actual)
      operationId: authLogout
      responses:
        '200':
          description: OK

  /api/v1/sucursales/health:
    get:
      tags: [Sucursales]
      summary: Health del flujo sucursales
      operationId: sucursalesHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  flow:
                    type: string
                    example: sucursales
                  message:
                    type: string

  /api/v1/sucursales:
    get:
      tags: [Sucursales]
      summary: Listar sucursales (GG todas; GS la asignada)
      operationId: sucursalesIndex
      responses:
        '200':
          description: OK
        '401':
          description: No autenticado
        '403':
          description: Sin permiso
    post:
      tags: [Sucursales]
      summary: Crear sucursal (solo gerente global)
      operationId: sucursalesStore
      responses:
        '201':
          description: Creada
        '409':
          description: Nombre duplicado
        '403':
          description: Prohibido

  /api/v1/sucursales/{id}:
    get:
      tags: [Sucursales]
      summary: Detalle con KPIs
      operationId: sucursalesShow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
        '404':
          description: No encontrada
        '403':
          description: Sin permiso
    put:
      tags: [Sucursales]
      summary: Actualizar sucursal (auditoría en `audit_logs`)
      operationId: sucursalesUpdate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
        '404':
          description: No encontrada
        '403':
          description: Sin permiso
    delete:
      tags: [Sucursales]
      summary: Baja lógica (soft delete); 409 si hay pedidos activos
      operationId: sucursalesDestroy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Eliminada (soft)
        '204':
          description: Alternativa sin cuerpo (no usada en esta implementación)
        '409':
          description: Pedidos activos
        '404':
          description: No encontrada

